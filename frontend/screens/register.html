<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up | Sanctuary Health</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#003d9b",
            tertiary: "#6400ab",
            "on-primary": "#ffffff",
            background: "#f7f9fb",
            "surface-container-low": "#f2f4f6",
            "surface-container-highest": "#e0e3e5",
            "on-surface": "#191c1e",
            "on-surface-variant": "#434654",
            outline: "#737685"
          },
          fontFamily: {
            headline: ["Manrope"],
            body: ["Inter"]
          },
          borderRadius: { DEFAULT: "0.25rem", xl: "1.5rem", full: "9999px" }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .bg-ethereal-gradient {
      background: radial-gradient(circle at top left, #dae2ff 0%, #f7f9fb 40%, #f0dbff 100%);
    }
  </style>
</head>
<body class="bg-ethereal-gradient font-body text-on-surface min-h-screen flex items-center justify-center p-6">
  <div class="relative w-full max-w-xl">
    <div class="bg-white/70 backdrop-blur-md rounded-2xl p-8 md:p-12 shadow-2xl shadow-primary/10 border border-white/40">
      <!-- Header -->
      <div class="text-center mb-10">
        <h1 class="text-3xl md:text-4xl font-headline font-extrabold text-on-surface mb-2">Create Your Account</h1>
        <p class="text-on-surface-variant font-medium">Join Hospital Booking to manage your healthcare journey.</p>
      </div>
      <!-- Form -->
      <form id="signupForm" class="space-y-6">
        <!-- Full Name -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase ml-1">Full Name</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">person</span>
            <input id="fullName" type="text" placeholder="Johnathan Doe" required
              class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-transparent rounded-2xl font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:border-primary/40 focus:bg-white transition-all outline-none"/>
          </div>
        </div>
        <!-- Email -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase ml-1">Email Address</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">email</span>
            <input id="email" type="email" placeholder="name@example.com" required
              class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-transparent rounded-2xl font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:border-primary/40 focus:bg-white transition-all outline-none"/>
          </div>
        </div>
        <!-- Phone -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase ml-1">Phone Number</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">call</span>
            <input id="phone" type="tel" placeholder="+1 (555) 000-0000" required
              class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-transparent rounded-2xl font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:border-primary/40 focus:bg-white transition-all outline-none"/>
          </div>
        </div>
        <!-- Password -->
        <div class="space-y-2">
          <label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase ml-1">Password</label>
          <div class="relative group">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
            <input id="password" type="password" placeholder="••••••••" required
              class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-transparent rounded-2xl font-body text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 focus:border-primary/40 focus:bg-white transition-all outline-none"/>
          </div>
        </div>
        <!-- Sign Up Button -->
        <div class="pt-4">
          <button type="submit" class="w-full py-4 px-6 bg-gradient-to-r from-primary to-tertiary text-on-primary font-headline font-bold rounded-2xl shadow-lg shadow-primary/20 hover:shadow-primary/40 scale-100 active:scale-[0.98] transition-all">
            Sign Up
          </button>
        </div>
        <!-- Login Link -->
        <div class="text-center">
          <p class="text-sm text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-bold hover:underline transition-all" href="/login">Login here</a>
          </p>
        </div>
      </form>
      <!-- Trust Indicators -->
      <div class="mt-12 flex justify-center items-center gap-6 border-t border-outline/20 pt-8">
        <div class="flex items-center gap-1.5 grayscale opacity-60">
          <span class="material-symbols-outlined text-[18px] text-primary" style="font-variation-settings: 'FILL' 1;">shield</span>
          <span class="text-[10px] font-bold tracking-widest text-on-surface-variant">SECURE ACCESS</span>
        </div>
        <div class="flex items-center gap-1.5 grayscale opacity-60">
          <span class="material-symbols-outlined text-[18px] text-tertiary" style="font-variation-settings: 'FILL' 1;">verified_user</span>
          <span class="text-[10px] font-bold tracking-widest text-on-surface-variant">HIPAA COMPLIANT</span>
        </div>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    const baseUrl = `${window.location.origin}/api/auth`;

    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const full_name = document.getElementById("fullName").value;
      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch(`${baseUrl}/signup`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ full_name, email, phone, password })
        });

        const data = await res.json();
        if (data.error) return alert(data.error);

        alert("Registration successful! Please login.");
        window.location.href = "/login";
      } catch (err) {
        console.error(err);
        alert("Something went wrong. Please try again.");
      }
    });
  </script>
</body>
</html>
