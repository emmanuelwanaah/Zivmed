<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">

<main class="min-h-screen flex flex-col md:flex-row">

<div class="absolute bottom-20 right-20 w-80 h-80 bg-secondary/20 rounded-full blur-3xl animate-float-delayed"></div>

<img class="w-full h-auto object-cover mix-blend-overlay" data-alt="abstract close up of microscopic biological cells and light particles in deep blue and purple tones with soft bokeh" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAj1FBxYo6Cj1Bqtq6f17dbccpAIXPebfKFSeWRWp4E1_b5lbat6GaMM2FNc4OYuz6q7dDWiFHZMyouEedY2VHRamEL0zscqjPHoUYFznDzt69uMiqtLqM6Xth2kq6UZjXf_d-x4rfTSU_qX-VFVvOnIrLRcZAbn-UIKhJXCcT7qJuZX_cMKMT_nDUDU702laRNgSjw3ShalLtRqh2s6dkHTDoAxSNCKP5OwxRSmyBN55vf4aqLxfxjS1y4B3WE7Vgezz-i6C_iMhw"/>
</div>
</section>
<!-- Right Side: Glassmorphism Login Card -->
<section class="w-full md:w-1/2 flex items-center justify-center p-6 sm:p-12 relative bg-surface-container-low">
<!-- Mobile Background Elements -->
<div class="md:hidden absolute inset-0 bg-ethereal-gradient opacity-10"></div>
<div class="w-full max-w-md glass-card p-10 rounded-xl shadow-[0_32px_64px_-12px_rgba(25,28,30,0.06)] border border-white/40 z-10">
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/20 mb-6">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">ecg_heart</span>
</div>
<h2 class="text-3xl font-headline font-extrabold text-on-surface tracking-tight mb-2">Doctor Login</h2>
<p class="text-on-surface-variant font-medium">Welcome back to Ziv Specialist Medical Centre</p>
</div>
<form id="loginForm" class="space-y-6">

    <!-- Email Field -->
    <div class="space-y-2">
    <label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase pl-1">Email Address</label>
    <div class="relative">
    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-xl">mail</span>
    <input id="email" class="w-full pl-12 pr-4 py-4 bg-surface-container-highest/50 border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-on-surface-variant/40" placeholder="dr.name@ziv.medical" type="email" required/>
    </div>
    </div>
    
    <!-- Password Field -->
    <div class="space-y-2">
    <div class="flex justify-between items-center px-1">
    <label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase">Password</label>
    </div>
    <div class="relative">
    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-xl">lock</span>
    <input id="password" class="w-full pl-12 pr-12 py-4 bg-surface-container-highest/50 border-none rounded-xl focus:ring-2 focus:ring-primary/20 focus:bg-white transition-all text-on-surface placeholder:text-on-surface-variant/40" placeholder="••••••••" type="password" required/>
    </div>
    </div>
    
    <!-- Button -->
    <button type="submit" class="w-full py-4 bg-gradient-to-r from-primary to-secondary text-white font-bold rounded-full shadow-lg shadow-primary/25 hover:shadow-primary/40 active:scale-[0.98] transition-all duration-200 text-lg">
    Sign In to Portal
    </button>
    
    </form>
<!-- Footer -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant font-medium">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="/doctor/signup">Sign up</a>
</p>
</div>
</div>
<!-- Absolute Bottom Legal/Links -->

</section>
</main>
<!-- Global Subtle Textures -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-multiply">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/clean-gray-paper.png')]"></div>
</div>
<script>
    const form = document.getElementById("loginForm");
    
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
    
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
    
      try {
        const res = await fetch("/api/doctor/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });
    
        const data = await res.json();
    
        if (!res.ok) {
          alert(data.error || "Login failed");
          return;
        }
    
        // Save token
        localStorage.setItem("token", data.token);
    
        // Redirect
        window.location.href = "/doctor/dashboard";
    
      } catch (err) {
        console.error(err);
        alert("Network error");
      }
    });
    </script>
</body>
