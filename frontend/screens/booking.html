<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
<link rel="manifest" href="/assets/favicon/site.webmanifest">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">

<title>Ziv Specialist Medical Centre</title>

<style>
body {
  font-family: 'Lato', sans-serif;
  background: #f4f6f9;
}

.booking-card {
  background: #fff;
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.step-indicator {
  display: flex;
  justify-content: space-between;
  margin-bottom: 30px;
}

.step {
  text-align: center;
  flex: 1;
  position: relative;
}

.step::after {
  content: "";
  position: absolute;
  top: 15px;
  left: 50%;
  width: 100%;
  height: 2px;
  background: #ddd;
  z-index: -1;
}

.step:last-child::after {
  display: none;
}

.step-circle {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #ddd;
  margin: auto;
  line-height: 30px;
  color: #fff;
}

.step.active .step-circle {
  background: #0d6efd;
}

.form-control, .form-select {
  border-radius: 10px;
}

.btn {
  border-radius: 10px;
  padding: 10px 20px;
}
</style>

</head>

<body>

<section class="py-5">
<div class="container">

<div class="booking-card mx-auto" style="max-width: 800px;">

<!-- STEP INDICATOR -->
<div class="step-indicator">
  <div class="step active" id="indicator1">
    <div class="step-circle">1</div>
    <small>Select</small>
  </div>
  <div class="step" id="indicator2">
    <div class="step-circle">2</div>
    <small>Details</small>
  </div>
</div>

<!-- STEP 1 -->
<div id="step1">
  <h4 class="fw-bold mb-3"><i class="bi bi-calendar-check"></i> Choose Appointment</h4>

  <form id="bookingStep1" class="row g-3">

    <div class="col-md-6">
      <label class="form-label">Service</label>
      <select id="service" class="form-select" required>
        <option value="">Choose service</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Doctor</label>
      <select id="doctor" class="form-select" required disabled>
        <option value="14">Dr. John Smith</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label">Date</label>
      <input type="date" id="date" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Time Slot</label>
      <select id="timeSlot" class="form-select" required>
        <option value="">Choose time</option>
      </select>
    </div>

    <div class="col-12 text-end">
      <button class="btn btn-primary">
        Next <i class="bi bi-arrow-right"></i>
      </button>
    </div>

  </form>
</div>

<!-- STEP 2 -->
<div id="step2" style="display:none;">
  <h4 class="fw-bold mb-3"><i class="bi bi-person"></i> Patient Details</h4>

  <form id="patientForm" class="row g-3">

    <div class="col-md-6">
      <label class="form-label">Full Name</label>
      <input type="text" id="fullName" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label class="form-label">Phone</label>
      <input type="tel" id="phone" class="form-control" required>
    </div>

    <div class="col-12 d-flex justify-content-between">
      <button type="button" class="btn btn-outline-secondary" onclick="goBack()">
        <i class="bi bi-arrow-left"></i> Back
      </button>

      <button type="submit" class="btn btn-success">
        Confirm <i class="bi bi-check-circle"></i>
      </button>
    </div>

  </form>
</div>

</div>
</div>
</section>
<script>
  document.addEventListener("DOMContentLoaded", () => {
  
    const API_BASE = `${window.location.origin}/api`;
  
    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");
    const indicator1 = document.getElementById("indicator1");
    const indicator2 = document.getElementById("indicator2");
  
    const bookingForm = document.getElementById("bookingStep1");
    const patientForm = document.getElementById("patientForm");
  
    const serviceSelect = document.getElementById("service");
    const doctorSelect = document.getElementById("doctor");
    const dateInput = document.getElementById("date");
    const timeSlotSelect = document.getElementById("timeSlot");
  
    const fullNameInput = document.getElementById("fullName");
    const emailInput = document.getElementById("email");
    const phoneInput = document.getElementById("phone");
  
    let savedBooking = JSON.parse(localStorage.getItem("bookingData")) || {};
  
    // =========================
    // 🔥 LOAD SERVICES FROM BACKEND
    // =========================
    async function loadServices() {
      try {
        const res = await fetch(`${API_BASE}/services`);
  
        if (!res.ok) throw new Error("Failed to fetch services");
  
        const data = await res.json();
  
        serviceSelect.innerHTML = `<option value="">Choose service</option>`;
  
        data.forEach(service => {
          const option = document.createElement("option");
          option.value = service.id;
          option.textContent = service.service_name;
          serviceSelect.appendChild(option);
        });
  
      } catch (err) {
        console.error("Error loading services:", err);
        alert("Failed to load services");
      }
    }
  
    // =========================
    // 🔥 LOAD TIME SLOTS
    // =========================
    function loadTimeSlots() {
      timeSlotSelect.innerHTML = `
        <option value="">Choose time</option>
        <option value="1">09:00 AM</option>
        <option value="2">10:00 AM</option>
        <option value="3">11:00 AM</option>
        <option value="4">12:00 PM</option>
      `;
    }
  
    // INIT
    loadServices();
    loadTimeSlots();
  
    // =========================
    // RESTORE VALUES
    // =========================
    if (savedBooking.service_id) serviceSelect.value = savedBooking.service_id;
    if (savedBooking.doctor_id) doctorSelect.value = savedBooking.doctor_id;
    if (savedBooking.date) dateInput.value = savedBooking.date;
    if (savedBooking.time_slot_id) timeSlotSelect.value = savedBooking.time_slot_id;
  
    if (savedBooking.fullName) fullNameInput.value = savedBooking.fullName;
    if (savedBooking.email) emailInput.value = savedBooking.email;
    if (savedBooking.phone) phoneInput.value = savedBooking.phone;
  
    // =========================
    // STEP 1
    // =========================
    bookingForm.addEventListener("submit", (e) => {
      e.preventDefault();
  
      if (!serviceSelect.value || !doctorSelect.value || !dateInput.value || !timeSlotSelect.value) {
        alert("Please fill all fields to proceed.");
        return;
      }
  
      savedBooking = {
        ...savedBooking,
        service_id: serviceSelect.value,
        doctor_id: doctorSelect.value,
        date: dateInput.value,
        time_slot_id: timeSlotSelect.value
      };
  
      localStorage.setItem("bookingData", JSON.stringify(savedBooking));
  
      step1.style.display = "none";
      step2.style.display = "block";
  
      indicator1.classList.remove("active");
      indicator2.classList.add("active");
    });
  
    // =========================
    // BACK BUTTON
    // =========================
    window.goBack = function () {
      step2.style.display = "none";
      step1.style.display = "block";
  
      indicator2.classList.remove("active");
      indicator1.classList.add("active");
    };
  
    // =========================
    // STEP 2
    // =========================
    patientForm.addEventListener("submit", (e) => {
      e.preventDefault();
  
      if (!fullNameInput.value || !emailInput.value || !phoneInput.value) {
        alert("Please fill all your details.");
        return;
      }
  
      savedBooking = {
        ...savedBooking,
        fullName: fullNameInput.value,
        email: emailInput.value,
        phone: phoneInput.value
      };
  
      localStorage.setItem("bookingData", JSON.stringify(savedBooking));
  
      alert("Booking saved!");
      window.location.href = "/reviews";
    });
  
  });
  </script>
</body>
</html>
