<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Payment Successful - Ziv Specialist Medical Centre</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#ddb7ff",
              "on-secondary-fixed-variant": "#2f2ebe",
              "surface": "#f7f9fb",
              "on-surface-variant": "#434654",
              "background": "#f7f9fb",
              "on-tertiary-fixed": "#2c0051",
              "on-tertiary": "#ffffff",
              "on-primary-container": "#c4d2ff",
              "surface-dim": "#d8dadc",
              "surface-container": "#eceef0",
              "error-container": "#ffdad6",
              "tertiary-container": "#8025ce",
              "surface-container-high": "#e6e8ea",
              "inverse-surface": "#2d3133",
              "on-secondary-container": "#fffbff",
              "on-primary-fixed": "#001848",
              "inverse-primary": "#b2c5ff",
              "secondary-fixed-dim": "#c0c1ff",
              "secondary-container": "#6063ee",
              "on-secondary-fixed": "#07006c",
              "on-secondary": "#ffffff",
              "primary": "#003d9b",
              "outline-variant": "#c3c6d6",
              "inverse-on-surface": "#eff1f3",
              "surface-bright": "#f7f9fb",
              "tertiary": "#6400ab",
              "tertiary-fixed": "#f0dbff",
              "surface-variant": "#e0e3e5",
              "secondary": "#4648d4",
              "error": "#ba1a1a",
              "surface-tint": "#0c56d0",
              "on-primary-fixed-variant": "#0040a2",
              "primary-fixed": "#dae2ff",
              "on-tertiary-fixed-variant": "#6900b3",
              "on-surface": "#191c1e",
              "surface-container-low": "#f2f4f6",
              "on-error-container": "#93000a",
              "primary-fixed-dim": "#b2c5ff",
              "on-tertiary-container": "#e6c7ff",
              "on-error": "#ffffff",
              "surface-container-lowest": "#ffffff",
              "surface-container-highest": "#e0e3e5",
              "outline": "#737685",
              "secondary-fixed": "#e1e0ff",
              "primary-container": "#0052cc",
              "on-background": "#191c1e"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .bg-mesh {
            background-color: #f7f9fb;
            background-image: 
                radial-gradient(at 0% 0%, hsla(217,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,100%,92%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(270,100%,95%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="font-body text-on-surface bg-mesh min-h-screen relative overflow-hidden flex flex-col">
<!-- Decorative Blurred Blobs -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/10 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
<div class="w-full max-w-md">
<!-- Glassmorphic Card -->
<div class="bg-white/80 backdrop-blur-xl rounded-[2rem] shadow-[0_32px_64px_-12px_rgba(0,61,155,0.08)] border border-white/40 p-8 md:p-10 text-center flex flex-col items-center">
<!-- Success Icon -->
<div id="successBlock" class="hidden flex flex-col items-center">
<div class="mb-8 relative">
<div class="w-24 h-24 rounded-full bg-emerald-50 flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-emerald-500 !text-5xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<!-- Subtle ring animation effect -->
<div class="absolute inset-0 rounded-full border-2 border-emerald-200 scale-125 opacity-20"></div>
<div class="absolute inset-0 rounded-full border-2 border-emerald-100 scale-150 opacity-10"></div>
</div>
<!-- Header Content -->
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary mb-2">Payment Successful</h1>
</div>
<!-- Dynamic Status Area -->
<div id="verifyingBlock" class="w-full bg-surface-container-low rounded-2xl p-4 flex items-center justify-center gap-3 mb-10">
    <div class="w-5 h-5 border-2 border-primary/20 border-t-primary rounded-full animate-spin"></div>
    <span class="text-sm font-semibold text-primary uppercase tracking-wider">
      Verifying Transaction
    </span>
  </div>
<!-- Transaction Details -->
<div class="w-full space-y-4 mb-10">
<div class="flex justify-between items-center px-2">

</div>
<!-- Spacer with background shift (No-Line rule) -->
<div class="h-px w-full bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
<div class="flex justify-between items-center px-2">

</div>


</div>
<!-- Action Buttons -->
<div class="w-full space-y-3">
    <a href="/login"><button class="w-full h-14 bg-gradient-to-r from-primary to-tertiary text-on-primary font-headline font-bold rounded-full shadow-lg shadow-primary/20 hover:scale-[0.98] transition-transform flex items-center justify-center">
                        Go to Dashboard
                    </button>
                   </a>
</div>
<!-- Support Link -->
<p class="mt-8 text-xs text-on-surface-variant">
                    Need help? <a class="text-primary font-semibold underline decoration-primary/30" href="#">Contact Support</a>
</p>
</div>
<!-- Footer Logo Anchor -->
<div class="mt-12 flex flex-col items-center gap-2 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="font-headline font-bold text-primary tracking-tight">Ziv Specialist Medical Centre</span>
</div>
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-semibold">The Trusted Sanctuary</p>
</div>
</div>
</main>
<script>
    const params = new URLSearchParams(window.location.search);
    const reference = params.get("reference");
    
    const verifyingBlock = document.getElementById("verifyingBlock");
    const successBlock = document.getElementById("successBlock");
    
    if (reference) {
      fetch(`/api/doctor/appointments/verify/${reference}`)
        .then(res => res.text())
        .then(() => {
          // ✅ HIDE spinner
          verifyingBlock.style.display = "none";
    
          // ✅ SHOW success UI
          successBlock.classList.remove("hidden");
        })
        .catch(() => {
          verifyingBlock.innerText = "Error verifying payment.";
        });
    } else {
      verifyingBlock.innerText = "No reference found.";
    }
    </script>
</body></html>
